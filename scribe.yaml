apiVersion: scribe/v1
kind: Registry
team:
    name: naoray
    description: Naoray dev team skill stack
catalog:
    - name: scribe-agent
      source: github:Naoray/skills@main
      author: naoray
      description: Agent skill that tells AI assistants how to use the scribe CLI to install, list, sync, and manage skills.
    - name: plan-my-day
      source: github:Naoray/skills@main
    - name: apple-calendar
      source: github:Naoray/skills@main
    - name: evaluate-day
      source: github:Naoray/skills@main
    - name: session-plan
      source: github:Naoray/skills@main
    - name: record
      source: github:Naoray/skills@main
    - name: meeting
      source: github:Naoray/skills@main
    - name: recap
      source: github:Naoray/skills@main
    - name: recap-report
      source: github:Naoray/skills@main
    - name: dev-browser
      source: github:Naoray/skills@main
    - name: cleanup
      source: github:Naoray/skills@main
    - name: create-changelog-pr
      source: github:Naoray/skills@main
    - name: update-changelog
      source: github:Naoray/skills@main
    - name: flow-review
      source: github:Naoray/skills@main
    - name: research-mode
      source: github:Naoray/skills@main
    - name: orchestrator-mode
      source: github:Naoray/skills@main
      description: Set the current session as an orchestrator that delegates work to solo-spawned subagents rather than editing files directly. Use when the user invokes /orchestrator-mode, or when a task is large enough to benefit from parallel delegation (multi-phase feature work, multi-reviewer spec pass, multiple independent library changes). Sets agent-selection rules (codex=coding, claude=skills/slash-commands, gemini=second-opinion), worktree-by-default isolation, and scratchpad/todo-based feedback capture so the repo stays clean.
    - name: orchestrator-handoff
      source: github:Naoray/skills@main
      description: Generate a handoff prompt for a new orchestrator session. Captures in-flight agents, active scratchpads, pending user decisions, locked design decisions, open PRs + issues, and next-wave dispatch intent. Writes output to solo scratchpad `handoff/<project>-<date>` and surfaces the prompt for the user to copy into a fresh orchestrator.
    - name: visual-review
      source: github:Naoray/skills@main
    - name: visual-review-cli
      source: github:Naoray/skills@main
    - name: xray
      source: github:Naoray/skills@main
