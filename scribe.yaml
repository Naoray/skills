apiVersion: scribe/v1
kind: Registry
team:
    name: naoray
    description: Naoray dev team skill stack
catalog:
    - name: plan-my-day
      source: github:Naoray/skills@main
    - name: apple-calendar
      source: github:Naoray/skills@main
    - name: evaluate-day
      source: github:Naoray/skills@main
    - name: session-plan
      source: github:Naoray/skills@main
    - name: record
      source: github:Naoray/skills@main
    - name: meeting
      source: github:Naoray/skills@main
    - name: dev-browser
      source: github:Naoray/skills@main
    - name: cleanup
      source: github:Naoray/skills@main
    - name: changelog-pr
      source: github:Naoray/skills@main
    - name: code-review-artifacts
      source: github:Naoray/skills@main
    - name: research-mode
      source: github:Naoray/skills@main
    - name: orchestrator-mode
      source: github:Naoray/skills@main
      description: Use when the user says `/orchestrator-mode`, asks you to coordinate agents, or gives large multi-phase work needing parallel delegation, reviews, PRs, scratchpads, or handoffs. Inputs - project goal, repo context, available Solo agents/processes, branch/worktree constraints, and any locked user decisions. Do not use when the user asks for a direct small edit, a normal code review, or a single-agent implementation; use focused coding/review skills instead. Produces delegation plan, agent briefs, monitoring protocol, review/merge routing, and state hygiene rules. Escalate if scope, product direction, merge authority, destructive cleanup, or agent/tool availability is unclear. All delegation runs via Solo MCP (`mcp__solo__spawn_process`) — never via the in-process Task/Agent tool.
    - name: orchestrator-handoff
      source: github:Naoray/skills@main
      description: Generate a handoff prompt for a new orchestrator session. Captures in-flight agents, active scratchpads, pending user decisions, locked design decisions, open PRs + issues, and next-wave dispatch intent. Writes output to solo scratchpad `handoff/<project>-<date>` and surfaces the prompt for the user to copy into a fresh orchestrator.
    - name: north-star
      source: github:Naoray/skills@main
      description: Use when the user says `/north-star`, "set the north star", "what's our project compass", "lock in project direction", asks to derive a guiding principle an autonomous agent can decide by, or when `/orchestrator-mode` boots in a project without one and prompts to create one. Inputs - repo at cwd, signals (README, package manifests, CHANGELOG, recent commits, open issues, MemPalace wing=<project>), and a user decision-of-record on the draft before persist. Do not use when the user wants a sprint plan, OKRs, roadmap, milestone breakdown, feature scoping, or marketing brief; use planning, brainstorming, or strategy skills instead. Produces docs/NORTH_STAR.md (mission, target users, non-goals, hard constraints, decision principles, success + anti-signals) plus a mirror MemPalace drawer in wing=<project>. Escalate if conflicting direction docs already exist, the user has not approved the draft, or write access to docs/ or MemPalace is denied. Auto-loaded by orchestrator-mode boot and auto-injected into every delegate brief.
    - name: visual-review
      source: github:Naoray/skills@main
    - name: skill-creator
      source: github:Naoray/skills@main
      description: Author or revise an AI-agent skill using the 5-part trigger contract, evidence-tier (E/P/H) gating, and progressive disclosure. LLM- and registry-agnostic; supports scribe, .claude/skills, .ai/skills, and custom backends. Mandatory reviewer pass before declaring done.
kits:
    - name: daily-workflow
      description: Plan, capture, and close the day from inside the agent — daily-notes-driven workflow with meeting capture, session planning, running log, and end-of-day reflection.
      path: kits/daily-workflow.yaml
    - name: release-pipeline
      description: PR bodies, comprehension diagrams, rendered-output verification, and post-ship hygiene on the way to merge.
      path: kits/release-pipeline.yaml
    - name: orchestration
      description: Multi-agent orchestration over Solo MCP — delegate parallel work, gate merges via reviewers, hand state to the next session.
      path: kits/orchestration.yaml
    - name: methodology
      description: Anti-hallucination citation discipline plus the canonical skill-authoring procedure (5-part trigger contract, evidence-tier gating).
      path: kits/methodology.yaml
    - name: mac-productivity
      description: macOS-specific productivity primitives — Calendar.app CRUD via AppleScript and a persistent-page browser automation surface.
      path: kits/mac-productivity.yaml
