apiVersion: scribe/v1
kind: Registry
team:
    name: naoray
    description: Naoray dev team skill stack
catalog:
    - name: scribe-agent
      path: scribe-agent
      author: naoray
      description: Agent skill that tells AI assistants how to use the scribe CLI to install, list, sync, and manage skills.
    - name: plan-my-day
      source: github:Naoray/skills@main
      path: skills/plan-my-day
    - name: evaluate-day
      source: github:Naoray/skills@main
      path: skills/evaluate-day
    - name: session-plan
      source: github:Naoray/skills@main
      path: skills/session-plan
    - name: record
      source: github:Naoray/skills@main
      path: skills/record
    - name: meeting
      source: github:Naoray/skills@main
      path: skills/meeting
    - name: recap
      source: github:Artistfy/hq@main
    - name: recap-report
      source: github:Artistfy/hq@main
    - name: dev-browser
      source: github:Artistfy/hq@main
    - name: cleanup
      source: github:Artistfy/hq@main
    - name: create-changelog-pr
      source: github:Artistfy/hq@main
    - name: update-changelog
      source: github:Naoray/skills@main
      path: skills/update-changelog
    - name: flow-review
      source: github:Artistfy/hq@main
    - name: research-mode
      source: github:Artistfy/hq@main
    - name: visual-review
      source: github:Artistfy/hq@main
    - name: visual-review-cli
      source: github:Artistfy/hq@main
